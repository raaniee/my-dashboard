<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사업 통합 관리</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8f7f4;color:#1a1a18;min-height:100vh;padding:24px}
.wrap{max-width:960px;margin:0 auto}
.top-tabs{display:flex;gap:4px;flex-wrap:wrap;padding-bottom:1rem;border-bottom:1px solid #e5e3dc;margin-bottom:1.25rem}
.ttab{padding:6px 16px;border-radius:20px;border:1px solid #e5e3dc;background:transparent;cursor:pointer;font-size:13px;font-weight:500;color:#666;transition:all .15s;white-space:nowrap}
.ttab.on{background:#1a1a18;color:#fff;border-color:transparent}
.panel{display:none}.panel.on{display:block}
.card{background:#fff;border:1px solid #e5e3dc;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem}
.sec-label{font-size:11px;font-weight:500;color:#888;letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px}
.two{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:1rem}
.four{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:1rem}
.metric{background:#f4f3f0;border-radius:8px;padding:.875rem 1rem}
.metric .lbl{font-size:12px;color:#888;margin-bottom:4px}
.metric .val{font-size:22px;font-weight:500;color:#1a1a18}
.proj-card{background:#fff;border:1px solid #e5e3dc;border-radius:12px;padding:.875rem 1rem}
.proj-name{font-size:13px;font-weight:500;color:#1a1a18;margin-bottom:4px}
.proj-sub{font-size:11px;color:#888;margin-bottom:8px}
.bar-wrap{height:4px;background:#f0ede8;border-radius:2px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px}
.pct-row{display:flex;justify-content:space-between;align-items:center;margin-top:4px}
.pct-num{font-size:11px;color:#aaa}
.status-badge{display:inline-block;font-size:10px;font-weight:500;padding:2px 8px;border-radius:10px}
.s-진행중{background:#E1F5EE;color:#085041}
.s-검토중{background:#FAEEDA;color:#633806}
.s-완료{background:#EAF3DE;color:#27500A}
.s-보류{background:#F1EFE8;color:#444441}
.s-긴급{background:#FCEBEB;color:#791F1F}
.row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid #f0ede8}
.row:last-child{border-bottom:none}
.row-main{flex:1;font-size:13px;color:#1a1a18}
.row-sub{font-size:11px;color:#888;margin-top:2px}
.row-date{font-size:11px;color:#aaa;white-space:nowrap}
.chk{width:15px;height:15px;cursor:pointer;accent-color:#1a1a18;flex-shrink:0}
.chk-lbl{font-size:13px;cursor:pointer;color:#1a1a18;flex:1}
.chk:checked+.chk-lbl{text-decoration:line-through;color:#bbb}
.add-row{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.add-row input,.add-row select{font-size:12px;padding:6px 10px;border:1px solid #ddd;border-radius:8px;background:#f8f7f4;color:#1a1a18;outline:none}
.add-row input:focus,.add-row select:focus{border-color:#888}
.add-row input{flex:1;min-width:80px}
.add-btn{padding:6px 14px;font-size:12px;border:1px solid #ddd;border-radius:8px;background:transparent;cursor:pointer;color:#666;white-space:nowrap}
.add-btn:hover{background:#f4f3f0}
.memo-area{width:100%;min-height:72px;padding:8px 10px;font-size:13px;border:1px solid #ddd;border-radius:8px;background:#f8f7f4;color:#1a1a18;resize:vertical;font-family:inherit;line-height:1.6;outline:none}
.month-hdr{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:2px;margin-bottom:4px}
.month-hdr span{text-align:center;font-size:11px;color:#888;padding:3px 0}
.month-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:2px}
.mcell{min-height:54px;border:1px solid #e5e3dc;border-radius:6px;padding:3px 5px;cursor:pointer;transition:background .1s}
.mcell:hover{background:#f0ede8}
.mcell.today{border-color:#1a1a18;border-width:1.5px}
.mcell.selected{background:#f0ede8;border-color:#1a1a18}
.mcell.other .dn{color:#ccc}
.dn{font-size:11px;font-weight:500;color:#1a1a18}
.edot{font-size:9px;color:#888;display:flex;align-items:center;gap:2px;margin-top:1px;overflow:hidden}
.nav-r{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.nav-r h3{font-size:14px;font-weight:500;color:#1a1a18}
.nbtn{background:none;border:1px solid #ddd;border-radius:8px;padding:4px 10px;cursor:pointer;font-size:12px;color:#666}
.nbtn:hover{background:#f4f3f0}
.exp-tag{display:inline-flex;align-items:center;font-size:10px;font-weight:500;padding:2px 7px;border-radius:10px}
.e-검토중{background:#FAEEDA;color:#633806}
.e-결재중{background:#E6F1FB;color:#0C447C}
.e-완료{background:#EAF3DE;color:#27500A}
.e-예정{background:#F1EFE8;color:#444441}
.note-card{background:#f8f7f4;border-radius:8px;padding:.75rem 1rem;margin-bottom:8px;position:relative}
.note-actions{position:absolute;top:8px;right:8px;display:flex;gap:4px}
.note-act-btn{background:none;border:none;cursor:pointer;font-size:15px;color:#bbb;line-height:1;padding:0 2px}
.note-act-btn:hover{color:#1a1a18}
.note-time{font-size:10px;color:#aaa;margin-bottom:4px}
.note-text{font-size:13px;color:#1a1a18;line-height:1.5}
.note-edit-area{width:100%;min-height:60px;padding:6px 8px;font-size:13px;border:1px solid #ddd;border-radius:6px;background:#fff;color:#1a1a18;resize:vertical;font-family:inherit;line-height:1.5;outline:none;margin-top:4px}
.proj-filter{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px}
.pf-btn{font-size:11px;padding:3px 10px;border-radius:12px;border:1px solid #e5e3dc;background:transparent;cursor:pointer;color:#888;transition:all .1s}
.del-btn{background:none;border:none;cursor:pointer;font-size:14px;color:#ccc;padding:0 2px}
.del-btn:hover{color:#c0392b}
.edit-btn{background:none;border:none;cursor:pointer;font-size:14px;color:#ccc;padding:0 2px}
.edit-btn:hover{color:#1a1a18}
.amount{font-size:12px;color:#888;white-space:nowrap}
h2{font-size:18px;font-weight:500;margin-bottom:2px}
.date-str{font-size:12px;color:#aaa;margin-bottom:1.25rem}
.save-notice{font-size:11px;color:#aaa;margin-left:8px}
/* 시간표 */
.timetable{display:flex;flex-direction:column;gap:2px}
.time-slot{display:flex;gap:8px;align-items:stretch;min-height:36px}
.time-label{font-size:11px;color:#aaa;width:36px;flex-shrink:0;padding-top:4px;text-align:right}
.time-content{flex:1;border-left:2px solid #f0ede8;padding-left:8px;padding-top:4px;padding-bottom:4px;min-height:36px}
.time-content.has-event{border-left-color:#378ADD}
.time-event{font-size:12px;padding:3px 8px;border-radius:6px;margin-bottom:2px;display:flex;align-items:center;gap:6px}
/* 주간뷰 */
.week-day-cols{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:4px}
.wdc{border:1px solid #e5e3dc;border-radius:8px;padding:6px;min-height:80px;cursor:pointer;transition:background .1s}
.wdc:hover{background:#f8f7f4}
.wdc.today-col{border-color:#1a1a18}
.wdc-name{font-size:11px;color:#888;text-align:center;margin-bottom:2px}
.wdc-num{font-size:13px;font-weight:500;text-align:center;width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:50%;margin:0 auto 4px}
.wdc-num.today{background:#1a1a18;color:#fff}
.wdc-event{font-size:10px;padding:2px 4px;border-radius:4px;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#fff}
/* 날짜 선택 패널 */
.day-panel{background:#fff;border:1px solid #e5e3dc;border-radius:12px;padding:1rem 1.25rem;margin-top:1rem}
.day-panel-title{font-size:14px;font-weight:500;color:#1a1a18;margin-bottom:12px;display:flex;align-items:center;gap:8px}
@media(max-width:600px){.two{grid-template-columns:1fr}.four{grid-template-columns:repeat(2,1fr)}.week-day-cols{grid-template-columns:repeat(7,minmax(0,1fr))}}
</style>
</head>
<body>
<div class="wrap">
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2px">
  <h2>사업 통합 관리</h2>
  <span class="save-notice" id="saveNotice"></span>
</div>
<p class="date-str" id="todayStr"></p>

<div class="top-tabs">
  <button class="ttab on" onclick="sw('overview',this)"><i class="ti ti-layout-dashboard"></i> 개요</button>
  <button class="ttab" onclick="sw('projects',this)"><i class="ti ti-briefcase"></i> 사업별</button>
  <button class="ttab" onclick="sw('spend',this)"><i class="ti ti-receipt"></i> 지출 검토</button>
  <button class="ttab" onclick="sw('docs',this)"><i class="ti ti-file-check"></i> 서류 관리</button>
  <button class="ttab" onclick="sw('daily',this)"><i class="ti ti-sun"></i> 데일리</button>
  <button class="ttab" onclick="sw('schedule',this)"><i class="ti ti-calendar"></i> 스케줄</button>
  <button class="ttab" onclick="sw('memo',this)"><i class="ti ti-notes"></i> 메모</button>
</div>

<!-- 개요 -->
<div class="panel on" id="p-overview">
  <div class="four">
    <div class="metric"><div class="lbl">총 사업 수</div><div class="val" id="ov-total">0</div></div>
    <div class="metric"><div class="lbl">진행중</div><div class="val" id="ov-active">0</div></div>
    <div class="metric"><div class="lbl">미완료 지출</div><div class="val" id="ov-spend">0</div></div>
    <div class="metric"><div class="lbl">미완료 서류</div><div class="val" id="ov-docs">0</div></div>
  </div>
  <div class="sec-label">사업 현황</div>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px" id="ov-proj-grid"></div>
</div>

<!-- 사업별 -->
<div class="panel" id="p-projects">
  <div class="card">
    <div class="sec-label">새 사업 추가</div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <input type="text" id="projNameInp" placeholder="사업명 입력..." style="font-size:13px;padding:6px 10px;border:1px solid #ddd;border-radius:8px;background:#f8f7f4;flex:1;min-width:140px;outline:none" onkeydown="if(event.key==='Enter')addProj()">
      <input type="text" id="projBudInp" placeholder="예산 (예: 100M)" style="font-size:13px;padding:6px 10px;border:1px solid #ddd;border-radius:8px;background:#f8f7f4;width:130px;outline:none">
      <select id="projStInp" style="font-size:13px;padding:6px 10px;border:1px solid #ddd;border-radius:8px;background:#f8f7f4;outline:none">
        <option>진행중</option><option>검토중</option><option>완료</option><option>보류</option>
      </select>
      <button class="add-btn" onclick="addProj()"><i class="ti ti-plus"></i> 추가</button>
    </div>
  </div>
  <div id="proj-list"></div>
</div>

<!-- 지출 -->
<div class="panel" id="p-spend">
  <div class="proj-filter" id="spendFilter"></div>
  <div class="card" style="padding:.75rem 1rem">
    <div class="add-row">
      <input type="text" id="spItemInp" placeholder="지출 항목명..." onkeydown="if(event.key==='Enter')addSpend()">
      <input type="text" id="spAmtInp" placeholder="금액(천원)" style="max-width:90px">
      <select id="spProjInp" style="font-size:12px;padding:6px 10px;border:1px solid #ddd;border-radius:8px;background:#f8f7f4;max-width:140px;outline:none"></select>
      <select id="spStInp" style="font-size:12px;padding:6px 10px;border:1px solid #ddd;border-radius:8px;background:#f8f7f4;max-width:90px;outline:none">
        <option>예정</option><option>검토중</option><option>결재중</option><option>완료</option>
      </select>
      <button class="add-btn" onclick="addSpend()"><i class="ti ti-plus"></i></button>
    </div>
  </div>
  <div id="spend-list"></div>
</div>

<!-- 서류 -->
<div class="panel" id="p-docs">
  <div class="proj-filter" id="docsFilter"></div>
  <div class="card" style="padding:.75rem 1rem">
    <div class="add-row">
      <input type="text" id="docNameInp" placeholder="서류명..." onkeydown="if(event.key==='Enter')addDoc()">
      <select id="docProjInp" style="font-size:12px;padding:6px 10px;border:1px solid #ddd;border-radius:8px;background:#f8f7f4;max-width:150px;outline:none"></select>
      <input type="text" id="docDeadInp" placeholder="기한 (6/20)" style="max-width:80px">
      <button class="add-btn" onclick="addDoc()"><i class="ti ti-plus"></i></button>
    </div>
  </div>
  <div id="docs-list"></div>
</div>

<!-- 데일리 -->
<div class="panel" id="p-daily">
  <div class="two">
    <div>
      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
          <div>
            <div style="font-size:16px;font-weight:500" id="dailyDateTitle"></div>
            <div style="font-size:12px;color:#aaa" id="dailyDateSub"></div>
          </div>
          <div style="display:flex;gap:6px">
            <button class="nbtn" onclick="chgDaily(-1)"><i class="ti ti-chevron-left"></i></button>
            <button class="nbtn" onclick="chgDailyToday()">오늘</button>
            <button class="nbtn" onclick="chgDaily(1)"><i class="ti ti-chevron-right"></i></button>
          </div>
        </div>
        <div class="sec-label">시간표</div>
        <div class="timetable" id="dailyTimetable"></div>
      </div>
    </div>
    <div>
      <div class="card">
        <div class="sec-label">이 날 일정</div>
        <div id="dailySchedList"></div>
        <div class="add-row" style="margin-top:10px">
          <input type="text" id="dailyTimeInp" placeholder="시간 (09:00)" style="max-width:80px">
          <select id="dailyProjInp" style="font-size:12px;padding:6px 10px;border:1px solid #ddd;border-radius:8px;background:#f8f7f4;max-width:130px;outline:none"></select>
          <input type="text" id="dailyNameInp" placeholder="일정명..." onkeydown="if(event.key==='Enter')addDailySched()">
          <button class="add-btn" onclick="addDailySched()"><i class="ti ti-plus"></i></button>
        </div>
      </div>
      <div class="card">
        <div class="sec-label">오늘 할 일</div>
        <div id="dailyTodoList"></div>
        <div class="add-row">
          <input type="text" id="dailyTodoInp" placeholder="할 일 추가..." onkeydown="if(event.key==='Enter')addDailyTodo()">
          <button class="add-btn" onclick="addDailyTodo()"><i class="ti ti-plus"></i></button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 스케줄 -->
<div class="panel" id="p-schedule">
  <!-- 월간 캘린더 -->
  <div class="card">
    <div class="nav-r">
      <button class="nbtn" onclick="chgMonth(-1)"><i class="ti ti-chevron-left"></i></button>
      <h3 id="mLabel"></h3>
      <button class="nbtn" onclick="chgMonth(1)"><i class="ti ti-chevron-right"></i></button>
    </div>
    <div class="month-hdr"><span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span></div>
    <div class="month-grid" id="mGrid"></div>
    <div style="font-size:11px;color:#aaa;margin-top:8px;text-align:center">날짜를 클릭하면 일정을 추가할 수 있어요</div>
  </div>

  <!-- 날짜 클릭 패널 -->
  <div class="day-panel" id="dayPanel" style="display:none">
    <div class="day-panel-title">
      <i class="ti ti-calendar-event" style="color:#378ADD"></i>
      <span id="dayPanelTitle"></span>
      <button class="nbtn" style="margin-left:auto;font-size:11px" onclick="closeDayPanel()">닫기</button>
    </div>
    <div id="dayPanelList"></div>
    <div class="add-row" style="margin-top:10px">
      <input type="text" id="dpTimeInp" placeholder="시간 (09:00)" style="max-width:80px">
      <select id="dpProjInp" style="font-size:12px;padding:6px 10px;border:1px solid #ddd;border-radius:8px;background:#f8f7f4;max-width:140px;outline:none"></select>
      <input type="text" id="dpNameInp" placeholder="일정명..." onkeydown="if(event.key==='Enter')addDayPanelSched()">
      <button class="add-btn" onclick="addDayPanelSched()"><i class="ti ti-plus"></i> 추가</button>
    </div>
  </div>

  <!-- 주간 뷰 -->
  <div class="card" style="margin-top:0">
    <div class="nav-r">
      <button class="nbtn" onclick="chgWeek(-1)"><i class="ti ti-chevron-left"></i></button>
      <h3 id="weekLabel"></h3>
      <button class="nbtn" onclick="chgWeek(1)"><i class="ti ti-chevron-right"></i></button>
    </div>
    <div class="week-day-cols" id="weekDayCols"></div>
    <div class="add-row" style="margin-top:12px">
      <input type="text" id="wkDateInp" placeholder="날짜(6/20)" style="max-width:75px">
      <input type="text" id="wkTimeInp" placeholder="시간(09:00)" style="max-width:80px">
      <select id="wkProjInp" style="font-size:12px;padding:6px 10px;border:1px solid #ddd;border-radius:8px;background:#f8f7f4;max-width:130px;outline:none"></select>
      <input type="text" id="wkNameInp" placeholder="일정명..." onkeydown="if(event.key==='Enter')addWeekSched()">
      <button class="add-btn" onclick="addWeekSched()"><i class="ti ti-plus"></i> 일정 추가</button>
    </div>
  </div>

  <!-- 전체 일정 목록 -->
  <div class="card">
    <div class="sec-label">전체 일정</div>
    <div id="sched-list"></div>
  </div>
</div>

<!-- 메모 -->
<div class="panel" id="p-memo">
  <div class="proj-filter" id="memoFilter"></div>
  <div class="card" style="padding:.75rem 1rem;margin-bottom:1rem">
    <div style="display:flex;gap:8px;align-items:flex-start">
      <textarea class="memo-area" id="memoInp" placeholder="메모 입력... (전화·회의 내용, 아이디어 등)" style="flex:1;min-height:60px"></textarea>
      <div style="display:flex;flex-direction:column;gap:4px">
        <select id="memoProjSel" style="font-size:12px;padding:6px 10px;border:1px solid #ddd;border-radius:8px;background:#f8f7f4;outline:none"></select>
        <button class="add-btn" onclick="addMemo()"><i class="ti ti-corner-down-left"></i> 저장</button>
      </div>
    </div>
  </div>
  <div id="memo-list"></div>
</div>
</div>

<script>
const DK=['일','월','화','수','목','금','토'];
const now=new Date();
let vm=now.getMonth(),vy=now.getFullYear();
let vWeekOffset=0;
let selectedDayKey=null;
let dailyDate=new Date(now);

const COLORS=['#378ADD','#1D9E75','#D85A30','#D4537E','#7F77DD','#BA7517','#639922','#993C1D','#534AB7','#0F6E56'];
function projColor(name){const idx=PROJECTS.findIndex(p=>p.name===name);return COLORS[((idx<0?0:idx))%COLORS.length]||'#888'}
function hexToRgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`}

function load(key,def){try{const v=localStorage.getItem(key);return v?JSON.parse(v):def}catch(e){return def}}
function save(key,val){try{localStorage.setItem(key,JSON.stringify(val));showSaved()}catch(e){}}
function showSaved(){const el=document.getElementById('saveNotice');el.textContent='저장됨 ✓';setTimeout(()=>el.textContent='',2000)}

let PROJECTS=load('projects',[]);
let SPENDS=load('spends',[]);
let DOCS=load('docs',[]);
let TODOS=load('todos',[]);
let SCHEDS=load('scheds',[]);
let MEMOS=load('memos',[]);
let nextPid=load('npid',1),nextSid=load('nsid',1),nextDid=load('ndid',1);
let nextTid=load('ntid',1),nextScid=load('nscid',1),nextMid=load('nmid',1);

function dateKey(y,m,d){return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`}
function parseSchedDate(s){
  if(!s||s==='미정')return null;
  const p=s.split('/');
  if(p.length===2){const m=parseInt(p[0])-1,d=parseInt(p[1]);return{m,d,y:now.getFullYear()+(m<now.getMonth()-3?1:0)}}
  return null;
}
function schedDateKey(sched){
  const p=parseSchedDate(sched.date);
  if(!p)return null;
  return dateKey(p.y,p.m,p.d);
}

  HOURS.forEach(h=>{

function renderSchedule(){
  fillProjSelects();
  document.getElementById('mLabel').textContent=`${vy}년 ${vm+1}월`;
  const g=document.getElementById('mGrid');g.innerHTML='';
  const first=new Date(vy,vm,1),sd=first.getDay(),dim=new Date(vy,vm+1,0).getDate(),prev=new Date(vy,vm,0).getDate();
  let day=1,nd=1;const tot=Math.ceil((sd+dim)/7)*7;
  for(let i=0;i<tot;i++){
    const cell=document.createElement('div');cell.className='mcell';
    let num,other=false,cellY=vy,cellM=vm;
    if(i<sd){num=prev-sd+i+1;other=true;cellM=vm-1;if(cellM<0){cellM=11;cellY--}}
    else if(day>dim){num=nd++;other=true;cellM=vm+1;if(cellM>11){cellM=0;cellY++}}
    else{num=day++}
    if(other)cell.classList.add('other');
    const td=new Date(cellY,cellM,num);
    if(td.toDateString()===now.toDateString())cell.classList.add('today');
    const dk=dateKey(cellY,cellM,num);
    if(dk===selectedDayKey)cell.classList.add('selected');
    cell.innerHTML=`<div class="dn">${num}</div>`;
    if(!other){
      const ds=SCHEDS.filter(s=>schedDateKey(s)===dk);
      ds.slice(0,2).forEach(s=>{
        const c=s.proj?projColor(s.proj):'#888';
        const e=document.createElement('div');e.className='edot';
        e.innerHTML=`<span style="display:inline-block;width:5px;height:5px;border-radius:50%;background:${c};flex-shrink:0;margin-right:2px"></span><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:50px">${s.name.substring(0,5)}</span>`;
        cell.appendChild(e);
      });
      if(ds.length>2){const more=document.createElement('div');more.style.cssText='font-size:9px;color:#aaa';more.textContent=`+${ds.length-2}`;cell.appendChild(more)}
    }
    cell.onclick=()=>openDayPanel(cellY,cellM,num,cell);
    g.appendChild(cell);
  }

  // 주간 뷰
  const wStart=new Date(now);wStart.setDate(now.getDate()-now.getDay()+vWeekOffset*7);
  const wEnd=new Date(wStart);wEnd.setDate(wStart.getDate()+6);
  document.getElementById('weekLabel').textContent=`${wStart.getMonth()+1}/${wStart.getDate()} – ${wEnd.getMonth()+1}/${wEnd.getDate()}`;
  const wc=document.getElementById('weekDayCols');wc.innerHTML='';
  for(let i=0;i<7;i++){
    const d=new Date(wStart);d.setDate(wStart.getDate()+i);
    const dk=dateKey(d.getFullYear(),d.getMonth(),d.getDate());
    const isT=d.toDateString()===now.toDateString();
    const col=document.createElement('div');col.className='wdc'+(isT?' today-col':'');
    col.innerHTML=`<div class="wdc-name">${DK[d.getDay()]}</div><div class="wdc-num${isT?' today':''}">${d.getDate()}</div>`;
    const ds=SCHEDS.filter(s=>schedDateKey(s)===dk).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
    ds.forEach(s=>{
      const c=s.proj?projColor(s.proj):'#888';
      const ev=document.createElement('div');ev.className='wdc-event';
      ev.style.background=c;
      ev.textContent=(s.time?s.time+' ':'')+s.name;
      col.appendChild(ev);
    });
    col.onclick=()=>openDayPanel(d.getFullYear(),d.getMonth(),d.getDate(),null);
    wc.appendChild(col);
  }

  // 전체 일정 목록
  const sl=document.getElementById('sched-list');sl.innerHTML='';
  const sorted=[...SCHEDS].sort((a,b)=>{
    const da=parseSchedDate(a.date),db=parseSchedDate(b.date);
    if(!da&&!db)return 0;if(!da)return 1;if(!db)return -1;
    const va=da.y*10000+da.m*100+da.d,vb=db.y*10000+db.m*100+db.d;
    return va-vb||(a.time||'').localeCompare(b.time||'');
  });
  if(!sorted.length){sl.innerHTML='<div style="font-size:13px;color:#aaa;padding:8px 0">등록된 일정이 없습니다.</div>'}
  sorted.forEach(s=>{
    const c=s.proj?projColor(s.proj):'#888';
    const r=document.createElement('div');r.className='row';
    r.innerHTML=`<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${c};flex-shrink:0"></span><span class="row-date">${s.date}${s.time?' '+s.time:''}</span><div class="row-main">${s.name}${s.proj?`<div class="row-sub">${s.proj}</div>`:''}</div><button class="del-btn" onclick="delSchedById(${s.id})"><i class="ti ti-x"></i></button>`;
    sl.appendChild(r);
  });
}

  document.getElementById('dpNameInp').value='';document.getElementById('dpTimeInp').value='';
  const parts2=selectedDayKey.split('-');
  renderDayPanel(parseInt(parts2[0]),parseInt(parts2[1])-1,parseInt(parts2[2]));
  renderSchedule();
}
function addWeekSched(){
  const n=document.getElementById('wkNameInp').value.trim();if(!n)return;
  SCHEDS.push({id:nextScid++,date:document.getElementById('wkDateInp').value||'미정',time:document.getElementById('wkTimeInp').value||'',name:n,proj:document.getElementById('wkProjInp').value||''});
  save('scheds',SCHEDS);save('nscid',nextScid);
  document.getElementById('wkNameInp').value='';document.getElementById('wkDateInp').value='';document.getElementById('wkTimeInp').value='';
  renderSchedule();
}
function chgMonth(d){vm+=d;if(vm>11){vm=0;vy++}if(vm<0){vm=11;vy--}renderSchedule()}
function chgWeek(d){vWeekOffset+=d;renderSchedule()}

/* ===== 메모 ===== */
let memoFilter=load('memoFilter','전체');
function renderMemo(){
  renderProjFilter('memoFilter',memoFilter,v=>{memoFilter=v;save('memoFilter',v)});
  fillProjSelects();
  const el=document.getElementById('memo-list');el.innerHTML='';
  const items=memoFilter==='전체'?MEMOS:MEMOS.filter(m=>m.proj===memoFilter||m.proj==='전체'&&memoFilter==='전체');
  if(!items.length){el.innerHTML='<div style="font-size:13px;color:#aaa;padding:.5rem 0">저장된 메모가 없습니다.</div>';return}
  [...items].reverse().forEach(m=>{
    const c=(m.proj&&m.proj!=='전체')?projColor(m.proj):'#ccc';
    const d=document.createElement('div');d.className='note-card';d.style.borderLeft=`3px solid ${c}`;
    d.innerHTML=`<div class="note-actions">
      <button class="note-act-btn" onclick="editMemo(${m.id})"><i class="ti ti-pencil"></i></button>
      <button class="note-act-btn" onclick="delMemo(${m.id})"><i class="ti ti-x"></i></button>
    </div>
    <div class="note-time">${m.time}${m.proj&&m.proj!=='전체'?` · <span style="color:${c}">${m.proj}</span>`:''}</div>
    <div class="note-text" id="mtext-${m.id}">${m.text.replace(/\n/g,'<br>')}</div>`;
    el.appendChild(d);
  });
}
function editMemo(id){
  const m=MEMOS.find(x=>x.id===id);if(!m)return;
  const el=document.getElementById('mtext-'+id);
  if(el&&el.tagName==='TEXTAREA'){m.text=el.value;save('memos',MEMOS);renderMemo();return}
  const ta=document.createElement('textarea');ta.className='note-edit-area';ta.value=m.text;ta.id='mtext-'+id;
  if(el)el.replaceWith(ta);ta.focus();
  ta.onblur=()=>{m.text=ta.value;save('memos',MEMOS);renderMemo()};
}
function addMemo(){
  const txt=document.getElementById('memoInp').value.trim();if(!txt)return;
  const t=new Date();
  const ts=`${t.getMonth()+1}/${t.getDate()} ${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}`;
  MEMOS.push({id:nextMid++,text:txt,proj:document.getElementById('memoProjSel').value||'전체',time:ts});
  save('memos',MEMOS);save('nmid',nextMid);
  document.getElementById('memoInp').value='';renderMemo();
}
function delMemo(id){MEMOS.splice(MEMOS.findIndex(m=>m.id===id),1);save('memos',MEMOS);renderMemo()}

function renderAll(){
  fillProjSelects();
  renderOverview();renderProjects();renderSpend();renderDocs();renderSchedule();renderMemo();
}

const dl2=['일','월','화','수','목','금','토'];
document.getElementById('todayStr').textContent=`${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 (${dl2[now.getDay()]})`;
renderAll();
</script>
