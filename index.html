<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사업 통합 관리</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8f7f4;color:#1a1a18;min-height:100vh;padding:20px}
.wrap{max-width:980px;margin:0 auto}
.top-tabs{display:flex;gap:4px;flex-wrap:wrap;padding-bottom:1rem;border-bottom:1px solid #e5e3dc;margin-bottom:1.25rem}
.ttab{padding:6px 16px;border-radius:20px;border:1px solid #e5e3dc;background:transparent;cursor:pointer;font-size:13px;font-weight:500;color:#666;transition:all .15s;white-space:nowrap}
.ttab.on{background:#1a1a18;color:#fff;border-color:transparent}
.panel{display:none}.panel.on{display:block}
.card{background:#fff;border:1px solid #e5e3dc;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem}
.sec-label{font-size:11px;font-weight:500;color:#888;letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px}
.two{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:1rem}
.four{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:1rem}
.metric{background:#f4f3f0;border-radius:8px;padding:.875rem 1rem}
.metric .lbl{font-size:12px;color:#888;margin-bottom:4px}
.metric .val{font-size:22px;font-weight:500;color:#1a1a18}
.proj-card{background:#fff;border:1px solid #e5e3dc;border-radius:12px;padding:.875rem 1rem;cursor:pointer;transition:all .15s}
.proj-card:hover{border-color:#aaa;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.bar-wrap{height:4px;background:#f0ede8;border-radius:2px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px}
.pct-row{display:flex;justify-content:space-between;align-items:center;margin-top:4px}
.pct-num{font-size:11px;color:#aaa}
.status-badge{display:inline-block;font-size:10px;font-weight:500;padding:2px 8px;border-radius:10px}
.s-진행중{background:#E1F5EE;color:#085041}.s-검토중{background:#FAEEDA;color:#633806}
.s-완료{background:#EAF3DE;color:#27500A}.s-보류{background:#F1EFE8;color:#444441}
.row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid #f0ede8}
.row:last-child{border-bottom:none}
.row-main{flex:1;font-size:13px;color:#1a1a18}
.row-sub{font-size:11px;color:#888;margin-top:2px}
.row-date{font-size:11px;color:#aaa;white-space:nowrap}
.chk{width:15px;height:15px;cursor:pointer;accent-color:#1a1a18;flex-shrink:0}
.chk-lbl{font-size:13px;cursor:pointer;color:#1a1a18;flex:1}
.chk:checked+.chk-lbl{text-decoration:line-through;color:#bbb}
.add-row{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.add-row input,.add-row select{font-size:12px;padding:6px 10px;border:1px solid #ddd;border-radius:8px;background:#f8f7f4;color:#1a1a18;outline:none}
.add-row input{flex:1;min-width:80px}
.add-btn{padding:6px 14px;font-size:12px;border:1px solid #ddd;border-radius:8px;background:transparent;cursor:pointer;color:#666;white-space:nowrap}
.add-btn:hover{background:#f4f3f0}
.memo-area{width:100%;min-height:72px;padding:8px 10px;font-size:13px;border:1px solid #ddd;border-radius:8px;background:#f8f7f4;color:#1a1a18;resize:vertical;font-family:inherit;line-height:1.6;outline:none}
/* 캘린더 */
.month-hdr{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:2px;margin-bottom:4px}
.month-hdr span{text-align:center;font-size:11px;color:#888;padding:3px 0}
.month-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:2px}
.mcell{min-height:90px;border:1px solid #e5e3dc;border-radius:6px;padding:3px 5px;cursor:pointer;transition:background .1s}
.mcell:hover{background:#f0ede8}
.mcell.today{border-color:#1a1a18;border-width:1.5px}
.mcell.selected{background:#f0ede8;border-color:#1a1a18}
.mcell.other .dn{color:#ccc}
.dn{font-size:11px;font-weight:500;color:#1a1a18;margin-bottom:2px}
.edot{font-size:9px;display:flex;align-items:center;gap:2px;margin-bottom:1px}
.edot span{overflow:hidden;white-space:normal;word-break:break-all;max-width:100%;line-height:1.2}
.nav-r{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.nav-r h3{font-size:14px;font-weight:500}
.nbtn{background:none;border:1px solid #ddd;border-radius:8px;padding:4px 10px;cursor:pointer;font-size:12px;color:#666}
.nbtn:hover{background:#f4f3f0}
.exp-tag{display:inline-flex;align-items:center;font-size:10px;font-weight:500;padding:2px 7px;border-radius:10px}
.e-검토중{background:#FAEEDA;color:#633806}.e-결재중{background:#E6F1FB;color:#0C447C}
.e-완료{background:#EAF3DE;color:#27500A}.e-예정{background:#F1EFE8;color:#444441}
.note-card{background:#f8f7f4;border-radius:8px;padding:.75rem 1rem;margin-bottom:8px;position:relative}
.note-actions{position:absolute;top:8px;right:8px;display:flex;gap:4px}
.note-act-btn{background:none;border:none;cursor:pointer;font-size:15px;color:#bbb;line-height:1;padding:0 2px}
.note-act-btn:hover{color:#1a1a18}
.note-time{font-size:10px;color:#aaa;margin-bottom:4px}
.note-text{font-size:13px;color:#1a1a18;line-height:1.5;padding-right:44px}
.note-edit-area{width:100%;min-height:60px;padding:6px 8px;font-size:13px;border:1px solid #ddd;border-radius:6px;background:#fff;color:#1a1a18;resize:vertical;font-family:inherit;outline:none;margin-top:4px}
.proj-filter{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px}
.pf-btn{font-size:11px;padding:3px 10px;border-radius:12px;border:1px solid #e5e3dc;background:transparent;cursor:pointer;color:#888}
.del-btn{background:none;border:none;cursor:pointer;font-size:14px;color:#ccc;padding:0 2px}
.del-btn:hover{color:#c0392b}
.edit-btn{background:none;border:none;cursor:pointer;font-size:14px;color:#ccc;padding:0 2px}
.edit-btn:hover{color:#1a1a18}
.amount{font-size:12px;color:#888;white-space:nowrap}
.timetable{display:flex;flex-direction:column;gap:2px}
.time-slot{display:flex;gap:8px;min-height:32px}
.time-label{font-size:11px;color:#aaa;width:36px;flex-shrink:0;padding-top:4px;text-align:right}
.time-content{flex:1;border-left:2px solid #f0ede8;padding:3px 8px;min-height:32px}
.time-event{font-size:12px;padding:2px 8px;border-radius:6px;margin-bottom:2px;display:flex;align-items:center;gap:6px}
.week-day-cols{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:4px}
.wdc{border:1px solid #e5e3dc;border-radius:8px;padding:6px;min-height:70px;cursor:pointer}
.wdc:hover{background:#f8f7f4}
.wdc.today-col{border-color:#1a1a18}
.wdc-name{font-size:11px;color:#888;text-align:center;margin-bottom:2px}
.wdc-num{font-size:13px;font-weight:500;width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:50%;margin:0 auto 4px}
.wdc-num.today{background:#1a1a18;color:#fff}
.wdc-event{font-size:10px;padding:2px 4px;border-radius:4px;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#fff}
.day-panel{background:#fff;border:1px solid #e5e3dc;border-radius:12px;padding:1rem 1.25rem;margin-top:1rem}
.day-panel-title{font-size:14px;font-weight:500;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.inline-edit{display:flex;gap:6px;align-items:center;flex:1}
.inline-edit input{font-size:13px;padding:3px 8px;border:1px solid #ddd;border-radius:6px;background:#fff;outline:none;flex:1}
.save-notice{font-size:11px;color:#aaa;margin-left:8px}
.proj-detail-panel{background:#fff;border:1px solid #e5e3dc;border-radius:12px;padding:1rem 1.25rem;margin-top:1rem}
/* 예산표 */
.budget-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.budget-table th{background:#1a3a5c;color:#fff;padding:7px 10px;text-align:center;font-weight:500;border:1px solid #2b5c8a}
.budget-table td{padding:6px 10px;border:1px solid #e5e3dc;vertical-align:middle}
.budget-table .proj-row td{font-weight:600;color:#fff}
.budget-table .item-row td{background:#EBF4FB;color:#1A3A5C;font-weight:500}
.budget-table .detail-row td{background:#fff}
.budget-table .detail-row:nth-child(even) td{background:#f7fbff}
.budget-table .total-row td{background:#FFE082;font-weight:700;color:#1A3A5C;font-size:13px}
.budget-table td.num{text-align:right;font-variant-numeric:tabular-nums}
.budget-table td.label{color:#555;font-size:11px}
.budget-input{width:100%;border:1px solid #ddd;border-radius:4px;padding:3px 6px;font-size:12px;text-align:right;background:#FFFDE7;outline:none;font-family:inherit}
.budget-input:focus{border-color:#378ADD}
.spend-sub-tabs{display:flex;gap:4px;margin-bottom:1rem}
.spend-sub-tab{padding:5px 14px;border-radius:16px;border:1px solid #e5e3dc;background:transparent;cursor:pointer;font-size:12px;font-weight:500;color:#666}
.spend-sub-tab.on{background:#1a1a18;color:#fff;border-color:transparent}
h2{font-size:18px;font-weight:500;margin-bottom:2px}
.date-str{font-size:12px;color:#aaa;margin-bottom:1.25rem}
@media(max-width:640px){.two{grid-template-columns:1fr}.four{grid-template-columns:repeat(2,1fr)}.budget-table{font-size:10px}}
</style>
</head>
<body>
<div class="wrap">
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2px">
  <h2>사업 통합 관리</h2>
  <span class="save-notice" id="saveNotice"></span>
</div>
<p class="date-str" id="todayStr"></p>
<div style="display:flex;align-items:center;gap:8px;font-size:12px;color:#888;margin-bottom:1rem;padding:8px 12px;background:#fff;border:1px solid #e5e3dc;border-radius:8px">
  <div id="syncDot" style="width:8px;height:8px;border-radius:50%;background:#ccc;flex-shrink:0"></div>
  <span id="syncMsg">데이터 불러오는 중...</span>
</div>
<div class="top-tabs">
  <button class="ttab on" onclick="sw('overview',this)">현황</button>
  <button class="ttab" onclick="sw('projects',this)">사업 진행 현황</button>
  <button class="ttab" onclick="sw('spend',this)">지출 현황</button>
  <button class="ttab" onclick="sw('docs',this)">서류 관리</button>
  <button class="ttab" onclick="sw('daily',this)">데일리</button>
  <button class="ttab" onclick="sw('schedule',this)">스케줄</button>
  <button class="ttab" onclick="sw('memo',this)">메모</button>
</div>

<!-- 개요 -->
<div class="panel on" id="p-overview">
  <div class="four">
    <div class="metric"><div class="lbl">총 사업 수</div><div class="val" id="ov-total">0</div></div>
    <div class="metric"><div class="lbl">진행중</div><div class="val" id="ov-active">0</div></div>
    <div class="metric"><div class="lbl">미완료 지출</div><div class="val" id="ov-spend">0</div></div>
    <div class="metric"><div class="lbl">미완료 서류</div><div class="val" id="ov-docs">0</div></div>
  </div>
  <div class="sec-label">사업 현황</div>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px" id="ov-proj-grid"></div>
</div>

<!-- 사업별 -->
<div class="panel" id="p-projects">
  <div class="card">
    <div class="sec-label">새 사업 추가</div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <input type="text" id="projNameInp" placeholder="사업명 입력..." style="font-size:13px;padding:6px 10px;border:1px solid #ddd;border-radius:8px;background:#f8f7f4;flex:1;min-width:140px;outline:none" onkeydown="if(event.key==='Enter')addProj()">
      <input type="text" id="projBudInp" placeholder="예산 (예: 100M)" style="font-size:13px;padding:6px 10px;border:1px solid #ddd;border-radius:8px;background:#f8f7f4;width:120px;outline:none">
      <select id="projStInp" style="font-size:13px;padding:6px 10px;border:1px solid #ddd;border-radius:8px;background:#f8f7f4;outline:none">
        <option>진행중</option><option>검토중</option><option>완료</option><option>보류</option>
      </select>
      <button class="add-btn" onclick="addProj()">+ 추가</button>
    </div>
  </div>
  <div id="proj-list"></div>
  <div class="proj-detail-panel" id="projDetailPanel" style="display:none">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
      <div id="projDetailDot" style="width:12px;height:12px;border-radius:50%"></div>
      <h3 id="projDetailTitle" style="font-size:15px;font-weight:500"></h3>
      <button class="nbtn" style="margin-left:auto" onclick="closeProjDetail()">닫기</button>
    </div>
    <div class="two">
      <div>
        <div class="sec-label">월간 일정</div>
        <div class="nav-r" style="margin-bottom:8px">
          <button class="nbtn" onclick="chgProjMonth(-1)">‹</button>
          <span id="projMonthLabel" style="font-size:13px;font-weight:500"></span>
          <button class="nbtn" onclick="chgProjMonth(1)">›</button>
        </div>
        <div class="month-hdr"><span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span></div>
        <div class="month-grid" id="projMonthGrid"></div>
      </div>
      <div>
        <div class="sec-label">이 사업 일정 목록</div>
        <div id="projSchedList"></div>
        <div class="add-row" style="margin-top:10px">
          <input type="text" id="projSchedDate" placeholder="날짜(6/20)" style="max-width:75px">
          <input type="text" id="projSchedTime" placeholder="시간(09:00)" style="max-width:75px">
          <input type="text" id="projSchedName" placeholder="일정명..." onkeydown="if(event.key==='Enter')addProjSched()">
          <button class="add-btn" onclick="addProjSched()">+ 추가</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 지출 현황 -->
<div class="panel" id="p-spend">
  <div class="spend-sub-tabs">
    <button class="spend-sub-tab on" onclick="swSpend('budget',this)">예산 현황표</button>
    <button class="spend-sub-tab" onclick="swSpend('list',this)">지출 목록</button>
  </div>
  <!-- 예산 현황표 -->
  <div id="spend-budget">
    <div class="card" style="padding:.75rem 1rem;overflow-x:auto">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div style="font-size:13px;font-weight:500;color:#1a1a18">2026년도 개항희망문화상권사업단 예산 현황표</div>
        <div style="font-size:11px;color:#888">(단위: 천원) &nbsp;|&nbsp; 파란 칸에 지출액 입력</div>
      </div>
      <table class="budget-table" id="budgetTable">
        <thead>
          <tr>
            <th style="width:18%">사업명</th>
            <th style="width:12%">비목</th>
            <th style="width:22%">세목</th>
            <th style="width:16%">예산액</th>
            <th style="width:16%">지출액</th>
            <th style="width:16%">잔액</th>
          </tr>
        </thead>
        <tbody id="budgetBody"></tbody>
        <tfoot>
          <tr class="total-row">
            <td colspan="3" style="text-align:center;font-weight:700">총  합  계</td>
            <td class="num" id="grandBudget"></td>
            <td class="num" id="grandSpent"></td>
            <td class="num" id="grandBalance"></td>
          </tr>
        </tfoot>
      </table>
    </div>
  </div>
  <!-- 지출 목록 -->
  <div id="spend-list" style="display:none">
    <div class="proj-filter" id="spendFilter"></div>
    <div class="card" style="padding:.75rem 1rem">
      <div class="add-row">
        <input type="text" id="spItemInp" placeholder="지출 항목명..." onkeydown="if(event.key==='Enter')addSpend()">
        <input type="text" id="spAmtInp" placeholder="금액(천원)" style="max-width:90px">
        <select id="spProjInp" style="font-size:12px;padding:6px 10px;border:1px solid #ddd;border-radius:8px;background:#f8f7f4;max-width:140px;outline:none"></select>
        <select id="spStInp" style="font-size:12px;padding:6px 10px;border:1px solid #ddd;border-radius:8px;background:#f8f7f4;max-width:90px;outline:none">
          <option>예정</option><option>검토중</option><option>결재중</option><option>완료</option>
        </select>
        <button class="add-btn" onclick="addSpend()">+ 추가</button>
      </div>
    </div>
    <div id="spend-items"></div>
  </div>
</div>

<!-- 서류 관리 -->
<div class="panel" id="p-docs">
  <!-- 사업 선택 탭 -->
  <div class="proj-filter" id="docsProjTabs"></div>
  <div id="docsContent"></div>
</div>

<!-- 데일리 -->
<div class="panel" id="p-daily">
  <div class="two">
    <div>
      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
          <div>
            <div style="font-size:16px;font-weight:500" id="dailyDateTitle"></div>
            <div style="font-size:12px;color:#aaa" id="dailyDateSub"></div>
          </div>
          <div style="display:flex;gap:6px">
            <button class="nbtn" onclick="chgDaily(-1)">‹</button>
            <button class="nbtn" onclick="chgDailyToday()">오늘</button>
            <button class="nbtn" onclick="chgDaily(1)">›</button>
          </div>
        </div>
        <div class="sec-label">시간표</div>
        <div class="timetable" id="dailyTimetable"></div>
      </div>
    </div>
    <div>
      <div class="card">
        <div class="sec-label">이 날 일정</div>
        <div id="dailySchedList"></div>
        <div class="add-row" style="margin-top:10px">
          <input type="text" id="dailyTimeInp" placeholder="시간(09:00)" style="max-width:78px">
          <select id="dailyProjInp" style="font-size:12px;padding:6px 10px;border:1px solid #ddd;border-radius:8px;background:#f8f7f4;max-width:130px;outline:none"></select>
          <input type="text" id="dailyNameInp" placeholder="일정명..." onkeydown="if(event.key==='Enter')addDailySched()">
          <button class="add-btn" onclick="addDailySched()">+ 추가</button>
        </div>
      </div>
      <div class="card">
        <div class="sec-label">오늘 할 일</div>
        <div id="dailyTodoList"></div>
        <div class="add-row">
          <input type="text" id="dailyTodoInp" placeholder="할 일 추가..." onkeydown="if(event.key==='Enter')addDailyTodo()">
          <button class="add-btn" onclick="addDailyTodo()">+ 추가</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 스케줄 -->
<div class="panel" id="p-schedule">
  <div class="card">
    <div class="nav-r">
      <button class="nbtn" onclick="chgMonth(-1)">‹</button>
      <h3 id="mLabel"></h3>
      <button class="nbtn" onclick="chgMonth(1)">›</button>
    </div>
    <div class="month-hdr"><span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span></div>
    <div class="month-grid" id="mGrid"></div>
    <div style="font-size:11px;color:#aaa;margin-top:8px;text-align:center">날짜 클릭 → 일정 추가/조회</div>
  </div>
  <div class="day-panel" id="dayPanel" style="display:none">
    <div class="day-panel-title">
      <span id="dayPanelTitle"></span>
      <button class="nbtn" style="margin-left:auto;font-size:11px" onclick="closeDayPanel()">닫기</button>
    </div>
    <div id="dayPanelList"></div>
    <div class="add-row" style="margin-top:10px">
      <input type="text" id="dpTimeInp" placeholder="시간(09:00)" style="max-width:80px">
      <select id="dpProjInp" style="font-size:12px;padding:6px 10px;border:1px solid #ddd;border-radius:8px;background:#f8f7f4;max-width:140px;outline:none"></select>
      <input type="text" id="dpNameInp" placeholder="일정명..." onkeydown="if(event.key==='Enter')addDayPanelSched()">

function syncStatus(state,msg){
  const dot=document.getElementById('syncDot');
  const txt=document.getElementById('syncMsg');
  if(dot)dot.style.background=state==='ok'?'#1D9E75':state==='saving'?'#BA7517':'#D85A30';
  if(txt)txt.textContent=msg;
}
async function loadFromSheet(){
  syncStatus('saving','데이터 불러오는 중...');
  try{
    const res=await fetch(SCRIPT_URL+'?t='+Date.now());
    const data=await res.json();
    if(data.status==='empty'||data.status==='error'){syncStatus('ok','구글 시트 연결됨 (새 데이터)');renderAll();return;}
    if(data.PROJECTS)PROJECTS=data.PROJECTS;
    if(data.SPENDS)SPENDS=data.SPENDS;
    if(data.DOCS)DOCS=data.DOCS;
    if(data.TODOS)TODOS=data.TODOS;
    if(data.SCHEDS)SCHEDS=data.SCHEDS;
    if(data.MEMOS)MEMOS=data.MEMOS;
    if(data.budgetSpent)budgetSpent=data.budgetSpent;
    if(data.PROJ_NOTES)PROJ_NOTES=data.PROJ_NOTES;
    if(data.ids){npid=data.ids.npid||1;nsid=data.ids.nsid||1;ndid=data.ids.ndid||1;ntid=data.ids.ntid||1;nscid=data.ids.nscid||1;nmid=data.ids.nmid||1;}
    syncStatus('ok','불러옴 · '+new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}));
    renderAll();
  }catch(e){syncStatus('err','불러오기 실패');renderAll();}
}
async function saveToSheet(){
  syncStatus('saving','저장 중...');
  const payload={PROJECTS,SPENDS,DOCS,TODOS,SCHEDS,MEMOS,budgetSpent,PROJ_NOTES,ids:{npid,nsid,ndid,ntid,nscid,nmid}};
  try{
    await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify(payload)});
    syncStatus('ok','저장됨 · '+new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}));
  }catch(e){syncStatus('err','저장 실패');}
}
function save(){
  if(saveTimer)clearTimeout(saveTimer);
  syncStatus('saving','저장 대기 중...');
  saveTimer=setTimeout(()=>saveToSheet(),2000);
}

function renderBudget(){
  const tbody=document.getElementById('budgetBody');tbody.innerHTML='';
  let grandB=0,grandS=0;
  BUDGET_DATA.forEach(proj=>{
    const projB=proj.items.reduce((s,i)=>s+i.budget,0);
    const projS=proj.items.reduce((s,i)=>s+(budgetSpent[proj.proj+'_'+i.semok]||0),0);
    const projBal=projB-projS;
    grandB+=projB;grandS+=projS;
    // 사업 헤더행
    const ph=document.createElement('tr');ph.className='proj-row';
    ph.style.background=proj.color;
    ph.innerHTML=`<td colspan="3" style="padding:7px 10px;font-size:12px">■ ${proj.proj}</td>
      <td class="num" style="padding:7px 10px">${fmtNum(projB)}</td>
      <td class="num" style="padding:7px 10px">${fmtNum(projS)}</td>
      <td class="num" style="padding:7px 10px;color:${projBal<0?'#c0392b':'inherit'}">${fmtNum(projBal)}</td>`;
    tbody.appendChild(ph);
    // 세목 행들
    proj.items.forEach(item=>{
      const key=proj.proj+'_'+item.semok;
      const spent=budgetSpent[key]||0;
      const bal=item.budget-spent;
      const tr=document.createElement('tr');tr.className='detail-row';
      tr.innerHTML=`<td class="label" style="padding-left:14px">${item.note||''}</td>
        <td style="color:#555;font-size:11px">${item.bimok}</td>
        <td style="font-size:11px;color:#333">${item.semok}</td>
        <td class="num">${fmtNum(item.budget)}</td>
        <td class="num" style="padding:3px 6px">
          <input class="budget-input" type="number" value="${spent||''}" placeholder="0"
            data-key="${key}" oninput="updateSpent(this)" style="width:90px">
        </td>
        <td class="num" style="color:${bal<0?'#c0392b':'#1a1a18'}">${fmtNum(bal)}</td>`;
      tbody.appendChild(tr);
    });
  });
  document.getElementById('grandBudget').textContent=fmtNum(grandB);
  document.getElementById('grandSpent').textContent=fmtNum(grandS);
  const gb=document.getElementById('grandBalance');
  gb.textContent=fmtNum(grandB-grandS);
  gb.style.color=grandB-grandS<0?'#c0392b':'#1a1a18';
}

function updateSpent(inp){
  const key=inp.dataset.key;
  const val=parseFloat(inp.value)||0;
  budgetSpent[key]=val;
  save();
  // 잔액 업데이트
  const td=inp.closest('tr').querySelectorAll('td');
  const budgetVal=parseFloat(td[3].textContent.replace(/,/g,''))||0;
  const bal=budgetVal-val;
  td[5].textContent=fmtNum(bal);
  td[5].style.color=bal<0?'#c0392b':'#1a1a18';
  // 총합계 갱신
  let gs=0;
  document.querySelectorAll('.budget-input').forEach(i=>gs+=parseFloat(i.value)||0);
  const grandB=BUDGET_DATA.reduce((s,p)=>s+p.items.reduce((ss,i)=>ss+i.budget,0),0);
  document.getElementById('grandSpent').textContent=fmtNum(gs);
  const gb=document.getElementById('grandBalance');
  gb.textContent=fmtNum(grandB-gs);
  gb.style.color=grandB-gs<0?'#c0392b':'#1a1a18';
  // 사업 헤더 갱신
  renderBudget();
}

function addSpend(){

function dateKey(y,m,d){return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`}
function parseSchedDate(s){
  if(!s||s==='미정')return null;
  const p=s.split('/');
  if(p.length===2){const mo=parseInt(p[0])-1,d=parseInt(p[1]),yr=now.getFullYear()+(mo<now.getMonth()-3?1:0);return{y:yr,m:mo,d}}
  return null;
}
function schedDk(sc){const p=parseSchedDate(sc.date);return p?dateKey(p.y,p.m,p.d):null}

  const c=COLORS[PROJECTS.indexOf(p)%COLORS.length];
  document.getElementById('projDetailPanel').style.display='block';
  document.getElementById('projDetailTitle').textContent=p.name;
  document.getElementById('projDetailDot').style.background=c;
  renderProjDetail();renderProjects();
  document.getElementById('projDetailPanel').scrollIntoView({behavior:'smooth',block:'nearest'});

function closeProjDetail(){selectedProjId=null;document.getElementById('projDetailPanel').style.display='none';renderProjects()}
function renderProjDetail(){
  const p=PROJECTS.find(x=>x.id===selectedProjId);if(!p)return;
  const c=COLORS[PROJECTS.indexOf(p)%COLORS.length];
  document.getElementById('projMonthLabel').textContent=`${projVy}년 ${projVm+1}월`;
  const g=document.getElementById('projMonthGrid');g.innerHTML='';
  const first=new Date(projVy,projVm,1),sd=first.getDay(),dim=new Date(projVy,projVm+1,0).getDate(),prev=new Date(projVy,projVm,0).getDate();
  let day=1,nd=1;const tot=Math.ceil((sd+dim)/7)*7;
  for(let i=0;i<tot;i++){
    const cell=document.createElement('div');cell.className='mcell';cell.style.minHeight='52px';
    let num,other=false,cy=projVy,cm=projVm;
    if(i<sd){num=prev-sd+i+1;other=true;cm=projVm-1;if(cm<0){cm=11;cy--}}
    else if(day>dim){num=nd++;other=true;cm=projVm+1;if(cm>11){cm=0;cy++}}
    else{num=day++}
    if(other)cell.classList.add('other');
    if(new Date(cy,cm,num).toDateString()===now.toDateString())cell.classList.add('today');
    cell.innerHTML=`<div class="dn">${num}</div>`;
    if(!other){
      const dk=dateKey(cy,cm,num);

function renderSchedule(){
  fillSelects();
  document.getElementById('mLabel').textContent=`${vy}년 ${vm+1}월`;
  const g=document.getElementById('mGrid');g.innerHTML='';
  const first=new Date(vy,vm,1),sd=first.getDay(),dim=new Date(vy,vm+1,0).getDate(),prev=new Date(vy,vm,0).getDate();
  let day=1,nd=1;const tot=Math.ceil((sd+dim)/7)*7;
  for(let i=0;i<tot;i++){
    const cell=document.createElement('div');cell.className='mcell';
    let num,other=false,cy=vy,cm=vm;
    if(i<sd){num=prev-sd+i+1;other=true;cm=vm-1;if(cm<0){cm=11;cy--}}
    else if(day>dim){num=nd++;other=true;cm=vm+1;if(cm>11){cm=0;cy++}}
    else{num=day++}
    if(other)cell.classList.add('other');
    const td=new Date(cy,cm,num);
    if(td.toDateString()===now.toDateString())cell.classList.add('today');
    const dk=dateKey(cy,cm,num);
    if(dk===selectedDayKey)cell.classList.add('selected');
    cell.innerHTML=`<div class="dn">${num}</div>`;
    if(!other){
      // 모든 일정 전부 표시
      SCHEDS.filter(s=>schedDk(s)===dk).forEach(s=>{
        const c=s.proj?projColor(s.proj):'#888';
        const e=document.createElement('div');e.className='edot';
        e.innerHTML=`<span style="display:inline-block;width:5px;height:5px;border-radius:50%;background:${c};flex-shrink:0;margin-right:2px"></span><span style="color:${c};font-size:9px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:56px">${s.time?s.time+' ':''}${s.name}</span>`;
        cell.appendChild(e);
      });
    }
    cell.onclick=()=>openDayPanel(cy,cm,num,cell);g.appendChild(cell);
  }
  // 주간
  const wS=new Date(now);wS.setDate(now.getDate()-now.getDay()+vWeekOffset*7);
  const wE=new Date(wS);wE.setDate(wS.getDate()+6);
  document.getElementById('weekLabel').textContent=`${wS.getMonth()+1}/${wS.getDate()} – ${wE.getMonth()+1}/${wE.getDate()}`;
  const wc=document.getElementById('weekDayCols');wc.innerHTML='';
  for(let i=0;i<7;i++){
    const d=new Date(wS);d.setDate(wS.getDate()+i);
    const dk=dateKey(d.getFullYear(),d.getMonth(),d.getDate());
    const isT=d.toDateString()===now.toDateString();
    const col=document.createElement('div');col.className='wdc'+(isT?' today-col':'');
    col.innerHTML=`<div class="wdc-name">${DK[d.getDay()]}</div><div class="wdc-num${isT?' today':''}">${d.getDate()}</div>`;
    SCHEDS.filter(s=>schedDk(s)===dk).sort((a,b)=>(a.time||'').localeCompare(b.time||'')).forEach(s=>{
      const c=s.proj?projColor(s.proj):'#888';const ev=document.createElement('div');ev.className='wdc-event';ev.style.background=c;ev.textContent=(s.time?s.time+' ':'')+s.name;col.appendChild(ev);
    });
    col.onclick=()=>openDayPanel(d.getFullYear(),d.getMonth(),d.getDate(),null);wc.appendChild(col);
  }
  // 전체 일정
  const sl=document.getElementById('sched-list');sl.innerHTML='';
  const sorted=[...SCHEDS].sort((a,b)=>{const pa=parseSchedDate(a.date),pb=parseSchedDate(b.date);if(!pa&&!pb)return 0;if(!pa)return 1;if(!pb)return -1;return(pa.y*10000+pa.m*100+pa.d)-(pb.y*10000+pb.m*100+pb.d)||(a.time||'').localeCompare(b.time||'')});
  if(!sorted.length)sl.innerHTML='<div style="font-size:13px;color:#aaa;padding:8px 0">등록된 일정이 없습니다.</div>';
  sorted.forEach(s=>{
    const c=s.proj?projColor(s.proj):'#888';const r=document.createElement('div');r.className='row';
    if(s._editing){r.innerHTML=`<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${c};flex-shrink:0"></span><span class="row-date">${s.date}</span><div class="inline-edit"><input type="text" value="${s.time||''}" placeholder="시간" style="max-width:70px" id="es-t-${s.id}"><input type="text" value="${s.name}" id="es-n-${s.id}"><button class="add-btn" style="padding:3px 10px" onclick="saveSchedEdit(${s.id})">저장</button><button class="del-btn" onclick="cancelSchedEdit(${s.id})"><i class="ti ti-x"></i></button></div>`;}
    else{r.innerHTML=`<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${c};flex-shrink:0"></span><span class="row-date">${s.date}${s.time?' '+s.time:''}</span><div class="row-main">${s.name}${s.proj?`<div class="row-sub">${s.proj}</div>`:''}</div><button class="edit-btn" onclick="startSchedEdit(${s.id})"><i class="ti ti-pencil"></i></button><button class="del-btn" onclick="delSchedById(${s.id})"><i class="ti ti-x"></i></button>`;}
    sl.appendChild(r);
  });
}

  const el=document.getElementById('mtext-'+id);
  if(el&&el.tagName==='TEXTAREA'){m.text=el.value;save();renderMemo();return}
  const ta=document.createElement('textarea');ta.className='note-edit-area';ta.value=m.text;ta.id='mtext-'+id;
  if(el)el.replaceWith(ta);ta.focus();ta.onblur=()=>{m.text=ta.value;save();renderMemo()};
}
function addMemo(){
  const txt=document.getElementById('memoInp').value.trim();if(!txt)return;
  const t=new Date();const ts=`${t.getMonth()+1}/${t.getDate()} ${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}`;
  MEMOS.push({id:nmid++,text:txt,proj:document.getElementById('memoProjSel').value||'전체',time:ts});
  save();save('nmid',nmid);document.getElementById('memoInp').value='';renderMemo();
}
function delMemo(id){MEMOS.splice(MEMOS.findIndex(m=>m.id===id),1);save();renderMemo()}

function renderAll(){
  fillSelects();renderOverview();renderProjects();renderSpendList();renderDocs();renderSchedule();renderMemo();
  if(document.getElementById('p-daily').classList.contains('on'))renderDaily();
  if(selectedProjId)renderProjDetail();
  if(document.getElementById('p-spend').classList.contains('on'))renderBudget();
}

document.getElementById('todayStr').textContent=`${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 (${DK[now.getDay()]})`;
loadFromSheet();
</script>
</body>
